<!doctype html>
<html lang="ja">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>うさうさふぁーむ</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <main class="game-shell" aria-labelledby="game-title">
      <header class="game-header">
        <div>
          <p class="eyebrow">Usa Usa Clicker</p>
          <h1 id="game-title">
            <button id="farmNameButton" class="farm-name-button" type="button">うさうさふぁーむ</button>
          </h1>
        </div>
        <div class="header-actions">
          <button id="soundToggle" class="icon-button" type="button" aria-label="音を切り替える">♪</button>
          <button id="soundVariant" class="icon-button sound-variant-button" type="button">音色 A</button>
        </div>
      </header>

      <section id="farm" class="farm" role="button" tabindex="0" aria-label="うさぎをなでる">
        <div id="farmStats" class="farm-stats" aria-label="現在のうさぎ数">
          <strong id="rabbitCount">0羽</strong>
          <span id="perSecond">毎秒 +0羽</span>
        </div>
        <div id="visualRabbitLayer" class="visual-rabbit-layer" aria-hidden="true"></div>
        <div id="floatLayer" class="float-layer" aria-hidden="true"></div>
        <p id="farmMessage" class="farm-message" aria-live="polite"></p>
      </section>

      <section class="upgrade-panel" aria-label="強化">
        <button id="carrotUpgrade" class="upgrade-button" type="button">
          <span id="carrotGem" class="carrot carrot-normal carrot-card-gem" aria-hidden="true"></span>
          <span>
            <strong>にんじん強化</strong>
            <small id="carrotUpgradeText">毎秒増加量を上げる</small>
          </span>
          <b id="carrotCost">25</b>
        </button>

        <button id="handUpgrade" class="upgrade-button" type="button">
          <span>
            <strong>なでる手強化</strong>
            <small id="handUpgradeText">なでる増加量を上げる</small>
          </span>
          <b id="handCost">15</b>
        </button>

        <button id="farmUpgrade" class="upgrade-button" type="button">
          <span>
            <strong>ふぁーむ強化</strong>
            <small id="farmUpgradeText">にんじんの毎秒増加を広げる</small>
          </span>
          <b id="farmCost">80</b>
        </button>

        <button id="friendUpgrade" class="upgrade-button" type="button">
          <span>
            <strong>おともだち</strong>
            <small id="friendUpgradeText">なでる力で手伝ってもらう</small>
          </span>
          <b id="friendCost">150</b>
        </button>
      </section>

      <footer class="reset-zone">
        <button id="resetGame" type="button">リセット</button>
      </footer>
    </main>

    <script src="app.js"></script>
  </body>
</html>
